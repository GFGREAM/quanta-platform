name: PR Checks

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run ESLint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        run: npm run build
        env:
          NEXTAUTH_URL: http://localhost:3000
          NEXTAUTH_SECRET: dummy-build-secret
          AUTH_AZURE_AD_CLIENT_ID: dummy
          AUTH_AZURE_AD_CLIENT_SECRET: dummy
          AUTH_AZURE_AD_TENANT_ID: dummy
          POWERBI_CLIENT_ID: dummy
          POWERBI_CLIENT_SECRET: dummy
          POWERBI_TENANT_ID: dummy
          POWERBI_DATASET_ID: dummy
          POWERBI_WORKSPACE_ID: dummy