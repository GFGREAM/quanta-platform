# ==========================================================
#  GitHub Actions Workflow - Deploy Quanta Portal to Azure
# ==========================================================
#  Utiliza Oryx Build + Publish Profile (sin ZIP manual)
#  Compatible con Next.js 14+ y Node 22 en App Service.
# ==========================================================

name: Deploy Quanta Portal to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: 22.x
      AZURE_WEBAPP_NAME: gfg-quanta-portal

    steps:
      # 1️⃣ Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Configurar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # 3️⃣ Instalar dependencias (solo producción)
      - name: Install dependencies
        run: |
          npm ci --omit=dev

      # 4️⃣ Generar build de producción
      - name: Build Next.js project
        run: |
          npm run build

      # 5️⃣ Asegurar script de inicio
      - name: Ensure start script in package.json
        run: |
          jq '.scripts.start="node server.js"' package.json > tmp.json && mv tmp.json package.json

      # 6️⃣ Desplegar directamente con Oryx (sin ZIP)
      - name: Deploy to Azure Web App (Oryx)
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: .
