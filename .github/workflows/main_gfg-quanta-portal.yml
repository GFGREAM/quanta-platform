name: Build and Deploy Quanta Portal to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Build Next.js project
        run: npm run build

      # 👉 OJO: SIN app-name. Solo publish-profile + package
      - name: Deploy to Azure Web App (via Publish Profile)
        uses: azure/webapps-deploy@v2
        with:
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B4AA0E94047945C5824072C1D6E1ECE8 }}
          package: .
