name: Build and Deploy Quanta Portal to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Configurar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      # 3️⃣ Instalar dependencias (solo producción)
      - name: Install dependencies
        run: |
          npm ci --omit=dev

      # 4️⃣ Generar build de producción
      - name: Build Next.js project
        run: |
          npm run build

      # 5️⃣ Iniciar sesión en Azure
      - name: Login to Azure
        uses: azure/login@v2
        with:
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B4AA0E94097495C5824072C1D62E1CE8 }}

      # 6️⃣ Desplegar a Azure Web App (Oryx autodetectará Next.js)
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'gfg-quanta-portal'
          package: .
