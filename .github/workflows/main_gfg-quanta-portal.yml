name: Build and Deploy Quanta Portal to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1️⃣ Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Configurar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      # 3️⃣ Instalar dependencias
      - name: Install dependencies
        run: npm ci --omit=dev

      # 4️⃣ Compilar el proyecto
      - name: Build Next.js project
        run: npm run build

      # 5️⃣ Login a Azure (forzado a versión funcional)
      - name: Azure Login (Publish Profile)
        uses: azure/login@v1.4.6
        with:
          creds: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B4AA0E94097495C5824072C1D62E1CE8 }}

      # 6️⃣ Desplegar al App Service
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'gfg-quanta-portal'
          package: .
