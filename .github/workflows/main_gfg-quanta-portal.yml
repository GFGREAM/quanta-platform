name: Build and Deploy Quanta Portal to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Build Next.js project
        run: npm run build

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'gfg-quanta-portal'
          publish-profile: "${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_B4AA0E94097495C5824072C1D62E1CE8 }}"
          package: .
