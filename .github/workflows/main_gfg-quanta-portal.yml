# ============================================
# 🚀 Deploy Quanta Portal to Azure Web App
# ============================================

name: Deploy Quanta Portal to Azure

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      NODE_VERSION: 22.x
      AZURE_WEBAPP_NAME: gfg-quanta-portal
      AZURE_WEBAPP_PACKAGE_PATH: "."
      BUILD_DIR: ".next"

    steps:
      # 1️⃣ Clonar el repositorio
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2️⃣ Configurar Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      # 3️⃣ Instalar dependencias (solo producción)
      - name: Install dependencies
        run: |
          npm ci --omit=dev

      # 4️⃣ Generar build de producción
      - name: Build Next.js project
        run: |
          npm run build

      # 5️⃣ Crear paquete de despliegue (ZIP)
      - name: Create deploy.zip
        run: |
          zip -r deploy.zip .next public server.js package.json startup.sh

      # 6️⃣ Desplegar en Azure App Service
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE }}
          package: deploy.zip
